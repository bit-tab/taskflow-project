<!DOCTYPE html>
<html lang="es" class="bg-white text-gray-800 dark:bg-gray-900 dark:text-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow</title>
    <script src="app.js" defer></script>
    <link href="style.css" rel="stylesheet">
</head>
<body class="min-h-screen flex flex-col items-center p-6 transition-colors duration-300">

    <header class="w-full max-w-xl mb-6 flex justify-between items-center">
        <h1 class="text-3xl font-bold">TaskFlow</h1>
        <button id="dark-toggle" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded hover:bg-gray-300 dark:hover:bg-gray-600 transition">
            Modo oscuro
        </button>
    </header>

    <form class="w-full max-w-xl flex gap-2 mb-4">
        <input type="text" placeholder="Añade una tarea" class="flex-1 px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400 dark:bg-gray-800 dark:border-gray-600">
        <button type="submit" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 dark:bg-blue-600 dark:hover:bg-blue-700 transition">
            Añadir
        </button>
    </form>

    <input type="text" id="search" placeholder="Buscar tarea" class="w-full max-w-xl px-4 py-2 mb-4 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400 dark:bg-gray-800 dark:border-gray-600">

    <ul id="task-list" class="w-full max-w-xl space-y-2"></ul>

</body>
</html>
