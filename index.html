<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Mi Gestor Pro</title>
    <link href="./output.css" rel="stylesheet">
    <link href="./style.css" rel="stylesheet">
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-300">

    <header class="p-6 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md sticky top-0 z-10 shadow-sm flex justify-between items-center">
        <h1 class="text-3xl font-black bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">TaskFlow</h1>
        <button id="themeToggle" class="p-3 rounded-2xl bg-slate-100 dark:bg-slate-700 hover:scale-110 transition-all shadow-inner">
            <span id="themeIcon" class="text-xl">🌙</span>
        </button>
    </header>

    <main class="container mx-auto px-4 py-10 max-w-5xl flex flex-col md:flex-row gap-10">
        <aside class="w-full md:w-1/3">
            <div class="bg-white dark:bg-slate-800 p-6 rounded-[2.5rem] shadow-2xl mb-6 border border-slate-100 dark:border-slate-700">
                <form id="taskForm" class="space-y-4">
                    <div class="flex gap-2">
                        <input type="text" id="taskInput" placeholder="¿Qué hay que hacer?" required
                            class="flex-1 p-4 rounded-2xl bg-slate-100 dark:bg-slate-700 outline-none text-lg">
                        <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-8 rounded-2xl transition-all">
                            Añadir
                        </button>
                    </div>
                    
                    <div class="flex flex-wrap gap-3">
                        <select id="userSelect" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-700 text-sm outline-none">
                            <option value="Monica">Mónica</option>
                            <option value="Hija">Hija</option>
                        </select>
                        <select id="categorySelect" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-700 text-sm outline-none">
                            <option value="Hogar">🏠 Hogar</option>
                            <option value="Trabajo">💼 Trabajo</option>
                            <option value="Colegio">📚 Colegio</option>
                            <option value="Extraescolares">🎨 Extraescolares</option>
                        </select>
                    </div>
                </form>
            </div>
            
            <div class="mb-6">
                <input type="text" id="searchInput" placeholder="🔍 Buscar en todas las tareas..." 
                    class="w-full p-4 rounded-2xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            
            <div id="taskGroups" class="space-y-8">
                </div>
            
            <p id="taskCounterSearch" class="mt-6 text-center text-slate-400 text-sm italic"></p>
        </section>
    </main>

    <script src="./app.js"></script>
</body>
</html>
