<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro</title>
    <link href="./output.css" rel="stylesheet">
    <link href="./style.css" rel="stylesheet">
</head>
<body class="min-h-screen pb-24">

    <header class="p-6 flex justify-between items-center max-w-7xl mx-auto">
        <h1 class="text-3xl font-black text-indigo-600 dark:text-indigo-400 italic">TaskFlow ✨</h1>
        <button id="themeToggle" class="p-3 rounded-2xl bg-white dark:bg-slate-800 shadow-lg">
            <span id="themeIcon">🌙</span>
        </button>
    </header>

    <main class="container mx-auto px-4 max-w-5xl">
        <section class="text-center mb-12">
            <h2 class="text-4xl font-extrabold mb-4">¡Tu caos, bajo control! ✨</h2>
            <p class="text-slate-500 dark:text-slate-400 mb-8 font-medium">Elige un nombre para tu proyecto y comienza a organizar tus tareas</p>
            
            <form id="newListForm" class="integrated-form">
                <input type="text" id="newListInput" placeholder="Nombre de tu proyecto..." required
                    class="flex-1 p-4 bg-transparent outline-none font-bold text-lg text-slate-800 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500">
                <button type="submit" class="bg-indigo-600 text-white font-bold px-10 rounded-[2rem] hover:bg-indigo-700 transition-all active:scale-95 shadow-lg shadow-indigo-500/20">
                    CREAR
                </button>
            </form>
        </section>

        <div class="flex justify-center gap-4 mb-10 text-[10px] font-black uppercase tracking-widest">
            <div class="px-4 py-2 glass-card">Total: <span id="statTotal">0</span></div>
            <div class="px-4 py-2 glass-card text-emerald-500">Hechas: <span id="statDone">0</span></div>
        </div>

        <div id="workspace" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            </div>
    </main>

    <footer>
        <div class="legend-container">
            <div class="flex items-center gap-2 text-xs font-bold text-orange-500"><span>⏳</span> PENDIENTE</div>
            <div class="flex items-center gap-2 text-xs font-bold text-blue-500"><span>🔄</span> PROCESO</div>
            <div class="flex items-center gap-2 text-xs font-bold text-emerald-500"><span>✅</span> HECHO</div>
        </div>
    </footer>

    <script src="./app.js"></script>
</body>
</html>
