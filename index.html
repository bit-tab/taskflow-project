<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Extreme Edition</title>
    <link href="./output.css" rel="stylesheet">
    <link href="./style.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-slate-50 to-indigo-100 dark:from-slate-950 dark:to-indigo-950 text-slate-900 dark:text-white min-h-screen transition-all duration-700">

    <header class="p-6 flex justify-between items-center max-w-7xl mx-auto">
        <h1 class="text-4xl font-black italic tracking-tighter bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 bg-clip-text text-transparent">TaskFlow</h1>
        <button id="themeToggle" class="w-14 h-14 rounded-2xl bg-white dark:bg-slate-800 shadow-xl flex items-center justify-center hover:scale-110 transition-all border border-white/50 dark:border-slate-700">
            <span id="themeIcon" class="text-2xl">🌙</span>
        </button>
    </header>

    <main class="container mx-auto px-4 py-6 max-w-7xl">
        <section id="welcome" class="mb-12 text-center">
            <h2 class="text-5xl font-black mb-4 drop-shadow-sm">¡Tu caos, bajo control! ✨</h2>
            <p class="text-indigo-600 dark:text-indigo-400 font-bold mb-8">Escribe un nombre para tu nueva aventura y empieza a organizar.</p>
            
            <form id="newListForm" class="max-w-xl mx-auto flex p-2 bg-white/50 dark:bg-slate-800/50 backdrop-blur-xl rounded-[2.5rem] shadow-2xl border border-white dark:border-slate-700">
                <input type="text" id="newListInput" placeholder="Nombre de la lista..." required
                    class="flex-1 p-4 bg-transparent outline-none font-bold placeholder:text-slate-400">
                <button type="submit" class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-black px-10 rounded-[2rem] hover:shadow-indigo-500/50 hover:shadow-lg transition-all active:scale-95">
                    CREAR
                </button>
            </form>
        </section>

        <div id="workspace" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pb-24">
            </div>
    </main>

    <footer class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white/80 dark:bg-slate-900/80 backdrop-blur-lg px-8 py-4 rounded-full shadow-2xl border border-white/20 flex gap-6 z-50">
        <div class="flex items-center gap-2 font-black text-[10px] uppercase text-amber-500">⏳ <span class="hidden sm:inline">Pendiente</span></div>
        <div class="flex items-center gap-2 font-black text-[10px] uppercase text-indigo-500">🔄 <span class="hidden sm:inline">En Proceso</span></div>
        <div class="flex items-center gap-2 font-black text-[10px] uppercase text-emerald-500">✅ <span class="hidden sm:inline">Completado</span></div>
    </footer>

    <script src="./app.js"></script>
</body>
</html>
