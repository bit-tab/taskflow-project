<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Tu Espacio Profesional</title>
    <link href="./output.css" rel="stylesheet">
    <link href="./style.css" rel="stylesheet">
</head>
<body class="bg-slate-100 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">

    <header class="sticky top-0 z-50 w-full bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 p-4 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-6">
                <h1 class="text-2xl font-black bg-gradient-to-r from-indigo-600 to-pink-500 bg-clip-text text-transparent">TaskFlow</h1>
                <div class="hidden sm:flex items-center gap-3 text-[10px] font-bold uppercase tracking-wider opacity-60">
                    <span class="flex items-center gap-1"><i class="w-2 h-2 rounded-full bg-amber-400"></i> Pendiente</span>
                    <span class="flex items-center gap-1"><i class="w-2 h-2 rounded-full bg-blue-500"></i> Proceso</span>
                    <span class="flex items-center gap-1"><i class="w-2 h-2 rounded-full bg-emerald-500"></i> Hecho</span>
                </div>
            </div>
            
            <button id="themeToggle" class="p-3 rounded-xl bg-slate-100 dark:bg-slate-800 hover:scale-105 transition-all">
                <span id="themeIcon" class="text-xl">🌙</span>
            </button>
        </div>
    </header>

    <main class="container mx-auto px-4 py-10 max-w-6xl">
        <section id="welcomeSection" class="text-center mb-12 animate-in fade-in duration-700">
            <h2 class="text-4xl font-black mb-4">¡Hola! Organiza tu día 🚀</h2>
            <p class="text-slate-500 dark:text-slate-400 mb-8 italic">"Crea una lista con tu nombre para empezar a ver la magia."</p>
            
            <form id="newListForm" class="max-w-lg mx-auto flex gap-2 p-2 bg-white dark:bg-slate-800 rounded-3xl shadow-xl">
                <input type="text" id="newListInput" placeholder="Nombre de tu nueva lista..." required
                    class="flex-1 p-4 rounded-2xl bg-transparent outline-none dark:text-white">
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-8 rounded-2xl transition-all">
                    Crear Lista
                </button>
            </form>
        </section>

        <div id="workspace" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <script src="./app.js"></script>
</body>
</html>
