<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TaskFlow</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>TaskFlow</h1>
</header>

<main>

<aside>
<h2>Categorías</h2>
<ul>
<li>Trabajo</li>
<li>Personal</li>
<li>Estudio</li>
</ul>
</aside>

<section>
<h2>Lista de tareas</h2>

<div class="task">
<span class="title">Estudiar HTML</span>
<span class="category">Estudio</span>
<span class="priority high">Alta</span>
</div>

<div class="task">
<span class="title">Comprar comida</span>
<span class="category">Personal</span>
<span class="priority medium">Media</span>
</div>

</section>

</main>
<script src="app.js"></script>
</body>
</html>
