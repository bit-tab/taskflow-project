<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Mi Gestor Pro</title>
    <link href="./output.css" rel="stylesheet">
    <link href="./style.css" rel="stylesheet">
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-300">

    <header class="p-6 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md sticky top-0 z-10 shadow-sm flex justify-between items-center">
        <h1 class="text-3xl font-black bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">TaskFlow</h1>
        <button id="themeToggle" class="p-3 rounded-2xl bg-slate-100 dark:bg-slate-700 hover:scale-110 transition-all shadow-inner">
            <span id="themeIcon" class="text-xl">🌙</span>
        </button>
    </header>

    <main class="container mx-auto px-4 py-10 max-w-5xl flex flex-col md:flex-row gap-10">
        <aside class="w-full md:w-1/3">
            <div class="bg-gradient-to-br from-indigo-500 to-purple-600 p-8 rounded-[2rem] text-white shadow-xl shadow-indigo-200 dark:shadow-none">
                <h2 class="text-2xl font-bold mb-2">¡Hola! 🚀</h2>
                <p class="opacity-90 mb-6 text-lg">Organiza tus tareas en nubes de colores y no pierdas el foco.</p>
                <div class="bg-white/20 p-4 rounded-2xl">
                    <p id="taskCounter" class="text-sm font-medium">Tienes 0 tareas pendientes</p>
                </div>
            </div>
        </aside>

        <section class="flex-1">
            <div class="bg-white dark:bg-slate-800 p-2 rounded-[2.5rem] shadow-2xl mb-10 border border-slate-100 dark:border-slate-700">
                <form id="taskForm" class="flex p-2 gap-2">
                    <input type="text" id="taskInput" placeholder="Añadir nueva tarea..." required
                        class="flex-1 p-5 rounded-[2rem] bg-slate-100 dark:bg-slate-700 border-none focus:ring-4 focus:ring-indigo-500/20 outline-none text-lg">
                    <button type="submit" 
                        class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 px-10 rounded-[2rem] transition-all hover:shadow-lg active:scale-95">
                        Añadir
                    </button>
                </form>
            </div>

            <div id="taskList" class="space-y-6">
                </div>

            <div class="bg-white/20 p-4 rounded-2xl">
                <p id="taskCounter" class="text-sm font-medium mb-3">Tienes 0 tareas pendientes</p>
                <div class="flex gap-3">
                    <input
                        type="text"
                        id="searchInput"
                        placeholder="🔍 Buscar tarea..."
                        class="flex-1 p-3 rounded-[1.25rem] bg-white/50 dark:bg-slate-700/30 border border-slate-200/70 dark:border-slate-600/50 placeholder-slate-500 dark:placeholder-slate-400 text-sm outline-none focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500/50 shadow-sm"
                    >
                    <button
                        type="button"
                        id="searchButton"
                        class="shrink-0 px-5 py-3 rounded-[1.25rem] bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm transition-all hover:shadow-lg active:scale-95 shadow-indigo-500/30"
                    >
                        <span aria-hidden="true">🔍</span> Buscar
                    </button>
                </div>
                </div>
        </section>
    </main>

    <script src="./app.js"></script>
</body>
</html>
