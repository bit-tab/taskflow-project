<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TaskFlow</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>TaskFlow</h1>
</header>

<main>

<aside>
<h2>Categorías</h2>
<ul>
<li>Trabajo</li>
<li>Personal</li>
<li>Estudio</li>
</ul>
</aside>

<section>
<h2>Lista de tareas</h2>

<!-- Input de búsqueda -->
<input type="text" id="search" placeholder="Buscar tarea">

<!-- Formulario para añadir nuevas tareas -->
<form>
<input type="text" placeholder="Nueva tarea" required>
<button>Añadir</button>
</form>

<!-- Lista de tareas -->
<ul id="task-list">
<!-- Aquí se añadirán dinámicamente las tareas -->
</ul>

</section>

</main>

<script src="app.js"></script>
</body>
</html>
