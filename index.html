<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro | Workspace</title>
    <link href="./output.css" rel="stylesheet">
    <link href="./style.css" rel="stylesheet">
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen">

    <header class="p-6 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md sticky top-0 z-50 shadow-sm flex justify-between items-center">
        <h1 class="text-2xl font-black bg-gradient-to-r from-indigo-600 to-purple-500 bg-clip-text text-transparent">TaskFlow Workspace</h1>
        <button id="themeToggle" class="p-3 rounded-xl bg-slate-100 dark:bg-slate-700">🌙</button>
    </header>

    <main class="p-4 md:p-8 space-y-10">
        <section class="max-w-xl mx-auto bg-white dark:bg-slate-800 p-6 rounded-[2rem] shadow-xl border border-indigo-100 dark:border-slate-700">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">🆕 Crear Nueva Lista General</h2>
            <div class="flex gap-2">
                <input type="text" id="newListInput" placeholder="Nombre de la lista (ej. Mónica)" 
                    class="flex-1 p-3 rounded-xl bg-slate-100 dark:bg-slate-700 outline-none border-2 border-transparent focus:border-indigo-500">
                <button onclick="createList()" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all">Crear</button>
            </div>
        </section>

        <div id="workspace" class="grid grid-cols-1 gap-10">
            </div>
    </main>

    <script src="./app.js"></script>
</body>
</html>
