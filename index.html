<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro | Sistema de Gestión</title>
    <link href="./output.css" rel="stylesheet">
    <link href="./style.css" rel="stylesheet">
</head>
<body class="bg-slate-100 dark:bg-[#080b12] text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300 pb-24">

    <header class="sticky top-0 z-50 w-full p-4 bg-white/80 dark:bg-[#0d111a]/80 backdrop-blur-md shadow-lg border-b border-slate-200 dark:border-slate-800">
        <div class="container mx-auto flex justify-between items-center max-w-7xl">
            <h1 class="text-3xl font-black bg-gradient-to-r from-pink-500 to-indigo-600 bg-clip-text text-transparent italic">TaskFlow</h1>
            <button id="themeToggle" aria-label="Cambiar modo de color" class="w-12 h-12 rounded-2xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center hover:scale-110 transition-all shadow-inner">
                <span id="themeIcon" class="text-xl">🌙</span>
            </button>
        </div>
    </header>

    <main class="container mx-auto px-4 py-10 max-w-7xl flex flex-col lg:flex-row gap-8">
        
        <aside class="lg:w-80 space-y-6 order-2 lg:order-1">
            <div class="glass-card p-6 sticky top-28">
                <h2 class="text-xl font-black mb-6 flex items-center gap-2">📊 Estadísticas</h2>
                <div class="grid grid-cols-3 lg:grid-cols-1 gap-4 text-center lg:text-left">
                    <div class="p-3 bg-indigo-50 dark:bg-indigo-900/20 rounded-2xl border border-indigo-100 dark:border-indigo-800">
                        <p class="text-[10px] uppercase font-bold text-indigo-500">Total</p>
                        <p id="statTotal" class="text-2xl font-black">0</p>
                    </div>
                    <div class="p-3 bg-amber-50 dark:bg-amber-900/20 rounded-2xl border border-amber-100 dark:border-amber-800">
                        <p class="text-[10px] uppercase font-bold text-amber-500">Pendientes</p>
                        <p id="statPending" class="text-2xl font-black">0</p>
                    </div>
                    <div class="p-3 bg-emerald-50 dark:bg-emerald-900/20 rounded-2xl border border-emerald-100 dark:border-emerald-800">
                        <p class="text-[10px] uppercase font-bold text-emerald-500">Hechas</p>
                        <p id="statDone" class="text-2xl font-black">0</p>
                    </div>
                </div>

                <div class="mt-8 space-y-4">
                    <h3 class="font-bold text-sm uppercase tracking-widest opacity-50">Filtros</h3>
                    <input type="text" id="searchInput" placeholder="Buscar tarea..." 
                        class="w-full p-3 rounded-xl bg-slate-100 dark:bg-slate-900 border-none focus:ring-2 focus:ring-indigo-500 outline-none text-base">
                    
                    <div class="flex flex-col gap-2">
                        <button onclick="setFilter('all')" class="text-left px-4 py-2 rounded-xl hover:bg-slate-200 dark:hover:bg-slate-700 font-bold text-sm">🌐 Todas</button>
                        <button onclick="setFilter('pendiente')" class="text-left px-4 py-2 rounded-xl hover:bg-slate-200 dark:hover:bg-slate-700 font-bold text-sm">⏳ Pendientes</button>
                        <button onclick="setFilter('completado')" class="text-left px-4 py-2 rounded-xl hover:bg-slate-200 dark:hover:bg-slate-700 font-bold text-sm">✅ Completadas</button>
                    </div>

                    <div class="pt-4 border-t border-slate-200 dark:border-slate-800 space-y-2">
                        <button onclick="completeAll()" class="w-full py-2 text-xs font-bold text-indigo-500 border border-indigo-500 rounded-xl hover:bg-indigo-500 hover:text-white transition-all">Marcar todo como hecho</button>
                        <button onclick="clearDone()" class="w-full py-2 text-xs font-bold text-red-500 border border-red-500 rounded-xl hover:bg-red-500 hover:text-white transition-all">Borrar completadas</button>
                    </div>
                </div>
            </div>
        </aside>

        <section class="flex-1 order-1 lg:order-2 space-y-10">
            <div class="text-center lg:text-left">
                <h2 class="text-4xl font-black mb-2">¡Tu caos, bajo control! ✨</h2>
                <p class="text-slate-500 dark:text-slate-400 italic">Elige un nombre para tu proyecto y comienza a organizar tus tareas</p>
            </div>

            <form id="newListForm" class="flex gap-2 p-2 bg-white dark:bg-slate-900 rounded-[2rem] shadow-2xl border border-white/20 dark:border-slate-800">
                <label for="newListInput" class="sr-only">Nombre del proyecto</label>
                <input type="text" id="newListInput" placeholder="Nombre de tu proyecto..." required
                    class="flex-1 p-4 bg-transparent outline-none dark:text-white font-bold text-base">
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-black px-8 rounded-2xl transition-all active:scale-95">
                    CREAR
                </button>
            </form>

            <div id="workspace" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                </div>
        </section>
    </main>

    <footer class="fixed bottom-0 left-0 w-full bg-white/90 dark:bg-slate-900/90 backdrop-blur-md py-4 px-6 shadow-2xl z-50 flex justify-center gap-8 border-t border-slate-200 dark:border-slate-800">
        <div class="flex items-center gap-2 font-black text-[10px] uppercase text-amber-500">⏳ <span>Pendiente</span></div>
        <div class="flex items-center gap-2 font-black text-[10px] uppercase text-indigo-500">🔄 <span>Proceso</span></div>
        <div class="flex items-center gap-2 font-black text-[10px] uppercase text-emerald-500">✅ <span>Hecho</span></div>
    </footer>

    <script src="./app.js"></script>
</body>
</html>
