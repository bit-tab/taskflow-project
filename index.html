<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Workspace Dinámico</title>
    <link href="./output.css" rel="stylesheet">
    <link href="./style.css" rel="stylesheet">
</head>
<body class="bg-indigo-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-500">

    <header class="sticky top-0 z-50 w-full glass-card p-4 md:p-6 flex justify-between items-center">
        <h1 class="text-2xl md:text-3xl font-black bg-gradient-to-r from-pink-500 to-indigo-600 bg-clip-text text-transparent">TaskFlow</h1>
        
        <div class="hidden md:flex gap-4 text-[10px] font-bold uppercase">
            <span class="flex items-center gap-1 text-amber-500">⏳ Pendiente</span>
            <span class="flex items-center gap-1 text-blue-500">🔄 En Proceso</span>
            <span class="flex items-center gap-1 text-emerald-500">✅ Hecho</span>
        </div>

        <button id="themeToggle" class="w-10 h-10 md:w-12 md:h-12 rounded-2xl bg-indigo-100 dark:bg-slate-700 flex items-center justify-center shadow-inner text-xl">
            <span id="themeIcon">🌙</span>
        </button>
    </header>

    <main class="container mx-auto px-4 py-8">
        <section class="text-center mb-12">
            <h2 class="text-3xl md:text-5xl font-extrabold mb-2">¡Bienvenido a tu Espacio! 🚀</h2>
            <p class="text-slate-500 dark:text-slate-400">Crea listas, organiza categorías y gestiona tus tareas con un clic.</p>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <aside class="lg:col-span-3 space-y-4">
                <div class="glass-card p-6 rounded-[2rem]">
                    <h3 class="font-bold mb-4">Nueva Lista Maestra</h3>
                    <input type="text" id="newListInput" placeholder="Ej: Mi Trabajo" 
                        class="w-full p-3 rounded-xl bg-slate-100 dark:bg-slate-900 border-none focus:ring-2 focus:ring-pink-500 outline-none mb-3">
                    <button onclick="createList()" class="w-full py-3 bg-pink-500 hover:bg-pink-600 text-white font-bold rounded-xl transition-all shadow-lg shadow-pink-200 dark:shadow-none">
                        + Crear Lista
                    </button>
                </div>
            </aside>

            <div id="workspace" class="lg:col-span-9 grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
                </div>
        </div>
    </main>

    <script src="./app.js"></script>
</body>
</html>
